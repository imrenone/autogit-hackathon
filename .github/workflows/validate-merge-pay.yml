name: Validate, Merge, and Pay

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'templates/**'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  validate-merge-pay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Get added template files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/main...HEAD -- 'templates/' 2>/dev/null || git diff --name-only HEAD~1 -- 'templates/')
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Validate, merge, and pay
        id: validate-merge-pay
        uses: actions/github-script@v7
        env:
          CONTEST_API_SECRET: ${{ secrets.CONTEST_API_SECRET }}
          CONTEST_API_URL: ${{ secrets.CONTEST_API_URL }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            async function reject(reason) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `**Submission rejected.**\n\n${reason}\n\nRead [HACKATHON.md](../blob/main/HACKATHON.md) for submission guidelines.`,
              });
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                state: 'closed',
              });
              core.setFailed(reason);
            }

            // ── Step 1: Find template file ────────────────────────────────
            const rawFiles = `${{ steps.changed.outputs.files }}`.trim();
            const templateFiles = rawFiles.split('\n').filter(f => f && f.startsWith('templates/') && f.endsWith('.md'));

            if (templateFiles.length === 0) {
              return await reject('No `.md` file found in the `templates/` folder. Add your template file there.');
            }
            if (templateFiles.length > 1) {
              return await reject('Only one template file is allowed per PR. Submit each template in a separate PR.');
            }

            const filePath = templateFiles[0];

            if (!fs.existsSync(filePath)) {
              return await reject(`Could not read file: ${filePath}. Make sure the file exists and is committed.`);
            }

            const content = fs.readFileSync(filePath, 'utf8');

            // ── Step 2: Parse frontmatter ─────────────────────────────────
            const fmMatch = content.match(/^---\n([\s\S]*?)\n---/);
            if (!fmMatch) {
              return await reject('Missing frontmatter. Your file must start with a `---` block containing `title`, `app_type`, and `wallet`.');
            }

            const fm = {};
            for (const line of fmMatch[1].split('\n')) {
              const colonIdx = line.indexOf(':');
              if (colonIdx === -1) continue;
              const key = line.slice(0, colonIdx).trim();
              const val = line.slice(colonIdx + 1).trim().replace(/^["']|["']$/g, '');
              if (key) fm[key] = val;
            }

            if (!fm.title) return await reject('Missing required frontmatter field: `title`');
            if (!fm.app_type) return await reject('Missing required frontmatter field: `app_type`');
            if (!fm.wallet) return await reject('Missing required frontmatter field: `wallet`');

            if (!/^0x[0-9a-fA-F]{40}$/.test(fm.wallet)) {
              return await reject('Invalid `wallet` address. Must be a valid Ethereum/Base address starting with `0x` followed by 40 hex characters.');
            }
            if (fm.wallet === '0x0000000000000000000000000000000000000000') {
              return await reject('Please replace the example wallet address with your real Base wallet address.');
            }

            // ── Step 3: Check app_type uniqueness (recursive scan) ────────
            function collectMdFiles(dir, exclude) {
              let results = [];
              let entries;
              try { entries = fs.readdirSync(dir, { withFileTypes: true }); } catch { return results; }
              for (const e of entries) {
                const full = path.join(dir, e.name);
                if (e.isDirectory()) {
                  results = results.concat(collectMdFiles(full, exclude));
                } else if (e.name.endsWith('.md') && full !== exclude) {
                  results.push(full);
                }
              }
              return results;
            }

            const existingFiles = collectMdFiles('templates', filePath);
            for (const ef of existingFiles) {
              const ec = fs.readFileSync(ef, 'utf8');
              const em = ec.match(/^---\n([\s\S]*?)\n---/);
              if (!em) continue;
              const efm = {};
              for (const line of em[1].split('\n')) {
                const ci = line.indexOf(':');
                if (ci === -1) continue;
                efm[line.slice(0, ci).trim()] = line.slice(ci + 1).trim().replace(/^["']|["']$/g, '');
              }
              if (efm.app_type && efm.app_type === fm.app_type) {
                return await reject(`App type \`${fm.app_type}\` is already taken. Check existing templates and choose a different app type.`);
              }
            }

            // ── Step 4: Check participant limits + duplicate entry ────────
            let participants = [];
            try {
              const { execSync } = require('child_process');
              const raw = execSync('git show origin/main:data/participants.json 2>/dev/null || echo "[]"').toString();
              participants = JSON.parse(raw);
            } catch { participants = []; }

            if (participants.length >= 100) {
              return await reject('The hackathon is full. All 100 slots have been filled. Thank you for participating!');
            }

            const authorId = context.payload.pull_request.user.id;
            const existing = participants.find(p => Number(p.github_id) === Number(authorId));
            if (existing) {
              return await reject(`Your GitHub account already has an accepted entry (#${existing.entry_number}). Only one entry per GitHub account is allowed.`);
            }

            // ── Step 5: Merge PR ──────────────────────────────────────────
            console.log('Validation passed. Merging PR...');
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'squash',
              commit_title: `add template: ${fm.title} (${fm.app_type})`,
            });
            console.log('PR merged.');

            // ── Step 6: Call payment API ──────────────────────────────────
            const pr = context.payload.pull_request;
            const apiUrl = process.env.CONTEST_API_URL || 'https://gitbank.io/api/contest/pay';
            console.log(`Calling payment API at ${apiUrl}...`);

            let payData;
            try {
              const res = await fetch(apiUrl, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'X-Contest-Secret': process.env.CONTEST_API_SECRET,
                },
                body: JSON.stringify({
                  github_id: pr.user.id,
                  github_login: pr.user.login,
                  wallet: fm.wallet,
                  template_title: fm.title,
                  app_type: fm.app_type,
                  pr_number: pr.number,
                  pr_url: pr.html_url,
                }),
              });
              const text = await res.text();
              if (!res.ok) {
                console.error(`Payment API error ${res.status}: ${text}`);
                core.setOutput('pay_error', `${res.status}: ${text}`);
              } else {
                payData = JSON.parse(text);
                console.log(`Payment sent. Entry #${payData.entryNumber}, vault: ${payData.vaultAddress}, tx: ${payData.txHash}`);
                core.setOutput('tx_hash', payData.txHash);
                core.setOutput('entry_number', String(payData.entryNumber));
                core.setOutput('vault_address', payData.vaultAddress);
              }
            } catch (err) {
              console.error(`Payment API call failed: ${err.message}`);
              core.setOutput('pay_error', err.message);
            }

            // ── Step 7: Update participants list ──────────────────────────
            if (payData) {
              participants.push({
                entry_number: payData.entryNumber,
                github_id: pr.user.id,
                github_login: pr.user.login,
                github_avatar: pr.user.avatar_url,
                template_title: fm.title,
                app_type: fm.app_type,
                pr_number: pr.number,
                pr_url: pr.html_url,
                tx_hash: payData.txHash,
                paid_at: new Date().toISOString(),
              });
              fs.writeFileSync('data/participants.json', JSON.stringify(participants, null, 2));
              console.log('participants.json updated.');
              core.setOutput('participants_updated', 'true');
            }

      - name: Checkout main for file updates
        if: steps.validate-merge-pay.outputs.participants_updated == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write participants and rebuild HTML
        if: steps.validate-merge-pay.outputs.participants_updated == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            // Fetch latest participants from API to get the freshest data
            const apiUrl = (process.env.CONTEST_API_URL || 'https://gitbank.io/api/contest').replace('/pay', '') + '/entries';
            let participants = [];
            try {
              const res = await fetch(apiUrl.replace('/contest/pay', '/contest/entries'));
              if (res.ok) {
                participants = await res.json();
              }
            } catch {}

            // Fallback: read from file that was written in previous step
            if (!participants.length) {
              try { participants = JSON.parse(fs.readFileSync('data/participants.json', 'utf8')); } catch {}
            }

            if (participants.length > 0) {
              fs.writeFileSync('data/participants.json', JSON.stringify(participants, null, 2));
            }

            execSync('node scripts/generate-list.js');
            console.log('HTML rebuilt.');

      - name: Commit and push updates
        if: steps.validate-merge-pay.outputs.participants_updated == 'true'
        run: |
          git config user.name "gitbankbot"
          git config user.email "285689409+teamgitbank@users.noreply.github.com"
          git add data/participants.json docs/index.html
          git diff --cached --quiet && echo "No changes to commit." || git commit -m "add entry #${{ steps.validate-merge-pay.outputs.entry_number }} - @${{ github.event.pull_request.user.login }}"
          git push

      - name: Comment on PR
        if: steps.validate-merge-pay.outputs.tx_hash != ''
        uses: actions/github-script@v7
        with:
          script: |
            const txHash = `${{ steps.validate-merge-pay.outputs.tx_hash }}`;
            const entryNumber = `${{ steps.validate-merge-pay.outputs.entry_number }}`;
            const vaultAddress = `${{ steps.validate-merge-pay.outputs.vault_address }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                `**Entry #${entryNumber} accepted. Reward sent.**`,
                ``,
                `5 gitUSDC has been deposited into your Gitbank vault on Base.`,
                ``,
                `Vault: \`${vaultAddress}\``,
                `Transaction: https://basescan.org/tx/${txHash}`,
                ``,
                `You are now on the [participant list](https://gitbankio.github.io/autogit-hackathon/).`,
              ].join('\n'),
            });

      - name: Comment pay error on PR
        if: steps.validate-merge-pay.outputs.pay_error != ''
        uses: actions/github-script@v7
        with:
          script: |
            const err = `${{ steps.validate-merge-pay.outputs.pay_error }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `**PR merged. Payment pending.**\n\nYour template was accepted and merged. The gitUSDC payment encountered an issue and will be processed manually.\n\nError: \`${err}\``,
            });
